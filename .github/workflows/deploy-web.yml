name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  WEB_APP_PATH: src/ai-genius-web
  WEB_APP_DIST_PATH: src/ai-genius-web/dist
  AZURE_RESOURCE_GROUP: rg-aigenius-dev
  STATIC_WEB_APP_NAME: aigenius-frontend-dev

jobs:
  deploy-web:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: src/ai-genius-web/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WEB_APP_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.WEB_APP_PATH }}
        run: npm run build

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App deployment token
        id: get-swa-token
        run: |
          token="$(az staticwebapp secrets list \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey \
            --output tsv)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-swa-token.outputs.token }}
          action: upload
          app_location: ${{ env.WEB_APP_DIST_PATH }}
          skip_app_build: true

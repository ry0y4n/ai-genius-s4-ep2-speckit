name: Deploy Infrastructure to Azure

run-name: Deploy infra (${{ github.event.inputs.environment || 'dev' }})

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-infra-${{ github.ref }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

env:
  AZURE_LOCATION: eastus2
  AZURE_API_LOCATION: japanwest
  APP_NAME: aigenius

jobs:
  infra:
    name: Deploy Bicep infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      resource-group: ${{ steps.env-map.outputs.resource_group }}
      api-app-name: ${{ steps.capture-outputs.outputs.api_app_name }}
      api-app-url: ${{ steps.capture-outputs.outputs.api_app_url }}
      static-web-app-name: ${{ steps.capture-outputs.outputs.static_web_app_name }}
      static-web-app-url: ${{ steps.capture-outputs.outputs.static_web_app_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve environment
        id: env-map
        shell: bash
        run: |
          environment="${{ github.event.inputs.environment || 'dev' }}"

          case "$environment" in
            dev|qa|prod)
              ;;
            *)
              echo "Unsupported environment: $environment" >&2
              exit 1
              ;;
          esac

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-aigenius-$environment" >> "$GITHUB_OUTPUT"
          echo "param_file=bicep/parameters.$environment.json" >> "$GITHUB_OUTPUT"

      - name: Create resource group
        run: |
          az group create \
            --name "${{ steps.env-map.outputs.resource_group }}" \
            --location "${{ env.AZURE_LOCATION }}"

      - name: Deploy Bicep template
        id: deploy-bicep
        run: |
          az deployment group create \
            --name main-deploy \
            --resource-group "${{ steps.env-map.outputs.resource_group }}" \
            --template-file bicep/main.bicep \
            --parameters @"${{ steps.env-map.outputs.param_file }}" \
            --parameters appName="${{ env.APP_NAME }}" \
            --parameters location="${{ env.AZURE_LOCATION }}" \
            --parameters apiLocation="${{ env.AZURE_API_LOCATION }}"

      - name: Capture deployment outputs
        id: capture-outputs
        shell: bash
        run: |
          resource_group="${{ steps.env-map.outputs.resource_group }}"

          api_app_name="$(az deployment group show --name main-deploy --resource-group "$resource_group" --query properties.outputs.apiAppName.value --output tsv)"
          api_app_url="$(az deployment group show --name main-deploy --resource-group "$resource_group" --query properties.outputs.apiAppUrl.value --output tsv)"
          static_web_app_name="$(az deployment group show --name main-deploy --resource-group "$resource_group" --query properties.outputs.staticWebAppName.value --output tsv)"
          static_web_app_url="$(az deployment group show --name main-deploy --resource-group "$resource_group" --query properties.outputs.staticWebAppUrl.value --output tsv)"

          echo "api_app_name=$api_app_name" >> "$GITHUB_OUTPUT"
          echo "api_app_url=$api_app_url" >> "$GITHUB_OUTPUT"
          echo "static_web_app_name=$static_web_app_name" >> "$GITHUB_OUTPUT"
          echo "static_web_app_url=$static_web_app_url" >> "$GITHUB_OUTPUT"

          {
            echo "### Infrastructure outputs"
            echo ""
            echo "| Name | Value |"
            echo "| --- | --- |"
            echo "| Resource group | $resource_group |"
            echo "| API App Service | $api_app_name |"
            echo "| API URL | $api_app_url |"
            echo "| Static Web App | $static_web_app_name |"
            echo "| Static Web App URL | $static_web_app_url |"
          } >> "$GITHUB_STEP_SUMMARY"
